name: MorimoriPhotoMaker
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH

targets:
  MorimoriPhotoMaker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MorimoriPhotoMaker
    settings:
      base:
        PRODUCT_NAME: MorimoriPhotoMaker
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.morimoriphotomaker
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: MorimoriPhotoMaker/Resources/Info.plist
    info:
      path: MorimoriPhotoMaker/Resources/Info.plist
      properties:
        CFBundleDisplayName: "盛り盛りフォトメーカー"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.photo-video
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "写真を選んで盛り盛り画像を作るために使います。写真は端末内だけで処理します。"
        NSPhotoLibraryAddUsageDescription: "作成した盛り盛り画像を写真アプリに保存するために使います。"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Light
    scheme:
      testTargets: []
  MorimoriPhotoMakerMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - MorimoriPhotoMakerMac
      - MorimoriPhotoMaker/Models.swift
      - MorimoriPhotoMaker/Assets.xcassets
      - path: MorimoriPhotoMaker/Resources/Overlays
        type: folder
    settings:
      base:
        PRODUCT_NAME: MorimoriPhotoMakerMac
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.morimoriphotomaker.macos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: MorimoriPhotoMakerMac/Info.plist
    info:
      path: MorimoriPhotoMakerMac/Info.plist
      properties:
        CFBundleDisplayName: "盛り盛りフォトメーカー"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.photography
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: ""
    scheme:
      testTargets: []
